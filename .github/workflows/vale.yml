name: Vale

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  vale:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vale
        run: |
          wget https://github.com/errata-ai/vale/releases/download/v3.12.0/vale_3.12.0_Linux_64-bit.tar.gz
          tar -xzf vale_3.12.0_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/

      - name: Verify Vale installation
        run: vale --version

      - name: Run Vale on repository
        run: vale .

# test rerun